<p><strong>Run this once, then delete or don't deploy this file.</strong></p>
<button id="seedBtn">Seed Items</button>
<pre id="log">Press the button to begin…</pre>

const auth = getAuth(app);

    },
    {
        name:        "Antitoxin",

// ============================================================
const log = document.getElementById("log");
const btn = document.getElementById("seedBtn");

function write(msg, cls = "") {
    log.innerHTML += `<span class="${cls}">${msg}</span>\n`;
}

btn.addEventListener("click", async () => {
    btn.disabled    = true;
    btn.textContent = "Seeding…";
    log.innerHTML   = "";

    const user = auth.currentUser;
    if (!user) {
        write("⚠ Not signed in. Please open the main app, sign in, then come back to this page.", "err");
        btn.disabled    = false;
        btn.textContent = "Seed Items";
        return;
    }

    write(`Signed in as: ${user.uid}\n`);

    let ok = 0, fail = 0;
    for (const item of ITEMS) {
        const payload = {
            ...item,
            status:      "approved",
            submittedBy: user.uid,
            submittedAt: Date.now(),
            approvedBy:  user.uid,
            approvedAt:  Date.now(),
        };
        try {
            const ref = await addDoc(collection(db, "items"), payload);
            write(`  ✓  ${item.name.padEnd(32)} → ${ref.id}`, "ok");
            ok++;
        } catch (e) {
            write(`  ✗  ${item.name.padEnd(32)} — ${e.message}`, "err");
            fail++;
        }
    }

    write(`\nDone. ${ok} added, ${fail} failed.`, ok && !fail ? "ok" : "err");
    btn.textContent = "Done";
});

// Auto-detect auth state
onAuthStateChanged(auth, user => {
    if (user) {
        write(`Auth ready — signed in as ${user.email ?? user.uid}`, "ok");
    } else {
        write("Not signed in. Open the main app in another tab, sign in, then refresh this page.", "err");
    }
});
</script>
</body>
</html>
