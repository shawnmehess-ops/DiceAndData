<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Character Sheet Manager</title>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>Welcome to the Character Sheet Manager!</h1>

    <!-- AUTH -->
    <div id="auth-ui">
        <h2>Sign Up or Sign In</h2>

        <input type="email" id="emailInput" placeholder="Email">
        <input type="password" id="passwordInput" placeholder="Password">

        <button id="signUpButton">Sign Up</button>
        <button id="signInButton">Sign In</button>

        <p id="userStatus">No user signed in.</p>
    </div>

    <!-- APP -->
    <div id="app-content" style="display:none;">

        <button id="signOutButton">Sign Out</button>

        <!-- CHARACTER LIST -->
        <div id="characterListView">
            <h2>Your Characters</h2>

            <input id="charNameInput" placeholder="Character Name">
            <button id="createCharButton">Create Character</button>

            <ul id="characterList"></ul>
        </div>

        <hr>

        <!-- EDITOR -->
        <div id="editor" style="display:none;" class="sheet">

            <button id="backButton">← Back to Characters</button>

            <h2 id="editorTitle">Character Sheet</h2>

            <!-- BASIC INFO -->
            <div class="sheet-section">
                <h3>Basic Info</h3>

                <label>Name</label>
                <input id="editName">

                <label>Class</label>
                <input id="editClass">

                <label>Level</label>
                <input id="editLevel" type="number" min="1">
            </div>

            <!-- ABILITIES (dynamic) -->
            <div class="sheet-section">
                <h3>Abilities</h3>

                <div id="statsContainer" class="stat-grid"></div>

                <hr>

                <input id="newStatName" placeholder="New Stat Name (e.g. LCK)">
                <button id="addStatButton">Add Stat</button>
            </div>

            <!-- SKILLS (dynamic) -->
            <div class="sheet-section">
                <h3>Skills</h3>

                <div id="skillsContainer"></div>

                <hr>

                <input id="newSkillName" placeholder="New Skill Name">

                <!-- Populated dynamically from currentStats -->
                <select id="newSkillStat"></select>

                <button id="addSkillButton">Add Skill</button>
            </div>

            <!-- ACTIONS -->
            <div class="sheet-section">
                <button id="deleteCharButton">Delete Character</button>
                <p id="editorStatus"></p>
            </div>

        </div>
    </div>

    <!-- IMPORTANT: script at bottom -->
    <script type="module" src="app.js?v=3"></script>

</body>
</html>
