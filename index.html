<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Character Sheet Manager</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
</head>
<body>
    <h1>Welcome to the Character Sheet Manager TEST 2!</h1>

    <div id="auth-ui">
        <h2>Sign Up or Sign In Test</h2>
        <input type="email" id="emailInput" placeholder="Email">
        <input type="password" id="passwordInput" placeholder="Password">
        <button id="signUpButton">Sign Up</button>
        <button id="signInButton">Sign In</button>
        <p id="userStatus">No user signed in.</p>
    </div>

    <div id="app-content" style="display:none;">
        <h2>Your Character Sheets</h2>
        <button id="signOutButton" style="display:none;">Sign Out</button>
        <p>Welcome! You are logged in.</p>

        <textarea id="testField" placeholder="Type something to save..."></textarea>
        <button id="saveButton">Save</button>
        <p id="saveStatus"></p>
    </div>

    <script type="module" src="app.js?v=1"></script></body>
</html>
