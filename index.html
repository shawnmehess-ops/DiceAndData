<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Character Sheet Manager</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
</head>
<body>
    <h1>Welcome to the Character Sheet Manager TEST 2!</h1>

    <div id="auth-ui">
        <h2>Sign Up or Sign In Test</h2>
        <input type="email" id="emailInput" placeholder="Email">
        <input type="password" id="passwordInput" placeholder="Password">
        <button id="signUpButton">Sign Up</button>
        <button id="signInButton">Sign In</button>
        <p id="userStatus">No user signed in.</p>
    </div>

    <div id="app-content" style="display:none;">
        <button id="signOutButton">Sign Out</button>
        <div id="characterListView">
            <h2>Your Characters</h2>
        
            <input id="charNameInput" placeholder="Character Name">
            <button id="createCharButton">Create Character</button>
        
            <ul id="characterList"></ul>
        </div>
        
        <hr>
        
        <!-- EDITOR -->
        <div id="editor" style="display:none;">
            <button id="backButton">⬅ Back to Characters</button>
        
            <h3 id="editorTitle">Edit Character</h3>
        
            <label>Name:</label>
            <input id="editName"><br>
        
            <label>Class:</label>
            <input id="editClass"><br>
        
            <label>Level:</label>
            <input id="editLevel" type="number" min="1"><br>

            <input id="statStr">
            <input id="statDex">
            <input id="statCon">
            <input id="statInt">
            <input id="statWis">
            <input id="statCha">
            
            <p id="editorStatus"></p>
        
            <button id="deleteCharButton">Delete Character</button>
        </div>
    </div>

    <script type="module" src="app.js?v=1"></script></body>
</html>
