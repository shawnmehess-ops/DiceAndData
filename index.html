<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Character Sheet Manager</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <style>
        body {
            font-family: "Georgia", serif;
            background: #f3f1e7;
            margin: 20px;
        }
        
        .sheet {
            max-width: 700px;
            margin: auto;
            padding: 20px;
            background: white;
            border: 2px solid #333;
        }
        
        .sheet-section {
            border: 1px solid #999;
            padding: 12px;
            margin-bottom: 15px;
            background: #fafafa;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #ccc;
            padding: 8px;
            background: white;
        }
        
        .stat input {
            width: 60px;
            text-align: center;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Character Sheet Manager TEST 2!</h1>

    <div id="auth-ui">
        <h2>Sign Up or Sign In Test</h2>
        <input type="email" id="emailInput" placeholder="Email">
        <input type="password" id="passwordInput" placeholder="Password">
        <button id="signUpButton">Sign Up</button>
        <button id="signInButton">Sign In</button>
        <p id="userStatus">No user signed in.</p>
    </div>

    <div id="app-content" style="display:none;">
        <button id="signOutButton">Sign Out</button>
        <div id="characterListView">
            <h2>Your Characters</h2>
        
            <input id="charNameInput" placeholder="Character Name">
            <button id="createCharButton">Create Character</button>
        
            <ul id="characterList"></ul>
        </div>
        
        <hr>
        
        <!-- EDITOR -->
        <div id="editor" style="display:none;" class="sheet">
        
            <button id="backButton">← Back to Characters</button>
        
            <h2 id="editorTitle">Character Sheet</h2>
        
            <!-- BASIC INFO -->
            <div class="sheet-section">
                <h3>Basic Info</h3>
        
                <label>Name</label>
                <input id="editName">
        
                <label>Class</label>
                <input id="editClass">
        
                <label>Level</label>
                <input id="editLevel" type="number" min="1">
            </div>
        
            <!-- STATS GRID -->
            <div class="sheet-section">
                <h3>Abilities</h3>
        
                <div class="stat-grid">
                    <div class="stat">
                        <label>STR</label>
                        <input id="statStr" type="number">
                    </div>
        
                    <div class="stat">
                        <label>DEX</label>
                        <input id="statDex" type="number">
                    </div>
        
                    <div class="stat">
                        <label>CON</label>
                        <input id="statCon" type="number">
                    </div>
        
                    <div class="stat">
                        <label>INT</label>
                        <input id="statInt" type="number">
                    </div>
        
                    <div class="stat">
                        <label>WIS</label>
                        <input id="statWis" type="number">
                    </div>
        
                    <div class="stat">
                        <label>CHA</label>
                        <input id="statCha" type="number">
                    </div>
                </div>
            </div>
        
            <!-- ACTIONS -->
            <div class="sheet-section">
                <button id="deleteCharButton">Delete Character</button>
                <p id="editorStatus"></p>
            </div>
        
        </div>
    </div>

    <script type="module" src="app.js?v=1"></script></body>
</html>
