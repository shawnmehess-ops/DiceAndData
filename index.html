<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Character Sheet Manager</title>
</head>
<body>
    <h1>Welcome to the Character Sheet Manager!</h1>

    <div id="auth-ui">
        <h2>Sign Up or Sign In Test</h2>
        <input type="email" id="emailInput" placeholder="Email (e.g., character@example.com)">
        <input type="password" id="passwordInput" placeholder="Password">
        <button id="signUpButton">Sign Up</button>
        <button id="signInButton">Sign In</button>
        <button id="signOutButton" style="display: none;">Sign Out</button> <!-- Initially hidden -->
        <p id="userStatus">No user signed in.</p>
    </div>

    <div id="app-content" style="display: none;">
        <h2>Your Character Sheets</h2>
        <!-- This is where your character management UI will go later -->
        <p>Welcome! You are logged in.</p>
    </div>

    <!-- Consolidated JavaScript using Modular SDK -->
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            signInWithEmailAndPassword,
            signOut,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js"; // IMPORT AUTH MODULE

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBYYgS04lxcbeawj7WDahEN7SbzYgVGLjE",
            authDomain: "diceanddata-81ebe.firebaseapp.com",
            projectId: "diceanddata-81ebe",
            storageBucket: "diceanddata-81ebe.firebasestorage.app",
            messagingSenderId: "547850961878",
            appId: "1:547850961878:web:8b2a99076d66c0ab451a77",
            measurementId: "G-LSZ59FPDTL"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app); // Get the auth instance for the Modular SDK

        // Get references to our HTML elements
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const signUpButton = document.getElementById('signUpButton');
        const signInButton = document.getElementById('signInButton');
        const signOutButton = document.getElementById('signOutButton');
        const userStatus = document.getElementById('userStatus');
        const authUiDiv = document.getElementById('auth-ui'); // Added from previous suggestion
        const appContentDiv = document.getElementById('app-content'); // Added from previous suggestion

        // --- User Registration (Sign Up) ---
        signUpButton.addEventListener('click', () => {
            const email = emailInput.value;
            const password = passwordInput.value;

            createUserWithEmailAndPassword(auth, email, password) // Modular SDK syntax
                .then((userCredential) => {
                    const user = userCredential.user;
                    console.log('User signed up:', user.email);
                    userStatus.innerText = `Signed up and logged in as: ${user.email}`;
                    passwordInput.value = '';
                })
                .catch((error) => {
                    const errorMessage = error.message;
                    console.error('Sign up error:', errorMessage);
                    userStatus.innerText = `Sign Up Error: ${errorMessage}`;
                });
        });

        // --- User Login (Sign In) ---
        signInButton.addEventListener('click', () => {
            const email = emailInput.value;
            const password = passwordInput.value;

            signInWithEmailAndPassword(auth, email, password) // Modular SDK syntax
                .then((userCredential) => {
                    const user = userCredential.user;
                    console.log('User signed in:', user.email);
                    userStatus.innerText = `Logged in as: ${user.email}`;
                    passwordInput.value = '';
                })
                .catch((error) => {
                    const errorMessage = error.message;
                    console.error('Sign in error:', errorMessage);
                    userStatus.innerText = `Sign In Error: ${errorMessage}`;
                });
        });

        // --- User Sign Out ---
        signOutButton.addEventListener('click', () => {
            signOut(auth) // Modular SDK syntax
                .then(() => {
                    console.log('User signed out.');
                    userStatus.innerText = 'No user signed in.';
                    emailInput.value = '';
                    passwordInput.value = '';
                })
                .catch((error) => {
                    const errorMessage = error.message;
                    console.error('Sign out error:', errorMessage);
                    userStatus.innerText = `Sign Out Error: ${errorMessage}`;
                });
        });

        // --- Monitor Authentication State (login/logout changes) ---
        onAuthStateChanged(auth, (user) => { // Modular SDK syntax
            if (user) {
                // User is signed in
                console.log('Auth state changed: User is signed in', user.email);
                userStatus.innerText = `Currently logged in: ${user.email} (UID: ${user.uid})`;

                // Show app content, hide auth UI
                authUiDiv.style.display = 'none';
                appContentDiv.style.display = 'block';
                // signOutButton is already styled to be block on sign in, no need to change
                
            } else {
                // User is signed out
                console.log('Auth state changed: No user is signed in');
                userStatus.innerText = 'No user signed in.';

                // Show auth UI, hide app content
                authUiDiv.style.display = 'block';
                appContentDiv.style.display = 'none';
                signOutButton.style.display = 'none';
            }
        });
    </script>

</body>
</html>
