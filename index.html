<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimoire - Character Sheet Manager</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="site-header">
        <h1>Grimoire</h1>
        <p class="subtitle">Character Sheet Manager</p>
        <div class="header-ornament" aria-hidden="true">
            <div class="line"></div>
            <div class="diamond"></div>
            <div class="diamond"></div>
            <div class="diamond"></div>
            <div class="line right"></div>
        </div>
        <div class="header-user-bar">
            <button id="signOutButton">Sign Out</button>
        </div>
    </header>

    <div id="auth-ui">

        <!-- Tab switcher -->
        <div class="auth-tabs" role="tablist">
            <button class="auth-tab auth-tab--active" id="tabSignIn"
                    role="tab" aria-selected="true"  aria-controls="panelSignIn">Sign In</button>
            <button class="auth-tab"                 id="tabSignUp"
                    role="tab" aria-selected="false" aria-controls="panelSignUp">Create Account</button>
        </div>

        <!-- ── SIGN IN PANEL ── -->
        <div id="panelSignIn" class="auth-panel" role="tabpanel">

            <!-- Hidden inputs so the browser password manager sees a real login form -->
            <form id="formSignIn" class="auth-form" autocomplete="on" novalidate>

                <div class="auth-field">
                    <label for="siEmail">Email</label>
                    <input type="email"    id="siEmail"    name="email"
                           autocomplete="username"
                           placeholder="your@email.com">
                </div>

                <div class="auth-field">
                    <label for="siPassword">Password</label>
                    <div class="auth-input-wrap">
                        <input type="password" id="siPassword" name="password"
                               autocomplete="current-password"
                               placeholder="••••••••">
                        <button type="button" class="auth-eye" aria-label="Show password"
                                data-target="siPassword">👁</button>
                    </div>
                </div>

                <button type="submit" id="signInButton" class="btn-primary auth-submit">
                    Sign In
                </button>

            </form>

            <p class="auth-msg" id="siMsg" aria-live="polite"></p>

        </div>

        <!-- ── CREATE ACCOUNT PANEL ── -->
        <div id="panelSignUp" class="auth-panel auth-panel--hidden" role="tabpanel">

            <form id="formSignUp" class="auth-form" autocomplete="on" novalidate>

                <p class="auth-notice">
                    Your email is used as your <strong>username only</strong> — it will never
                    be verified or contacted. A real email address is not required, but the
                    system does expect the format <em>something@something.something</em>.
                </p>

                <div class="auth-field">
                    <label for="suEmail">Email</label>
                    <input type="email"    id="suEmail"    name="email"
                           autocomplete="username"
                           placeholder="anything@works.fine">
                </div>

                <div class="auth-field">
                    <label for="suPassword">Password <span class="auth-hint">(min. 6 characters)</span></label>
                    <div class="auth-input-wrap">
                        <input type="password" id="suPassword" name="new-password"
                               autocomplete="new-password"
                               placeholder="••••••••">
                        <button type="button" class="auth-eye" aria-label="Show password"
                                data-target="suPassword">👁</button>
                    </div>
                </div>

                <div class="auth-field">
                    <label for="suConfirm">Confirm Password</label>
                    <div class="auth-input-wrap">
                        <input type="password" id="suConfirm" name="confirm-password"
                               autocomplete="new-password"
                               placeholder="••••••••">
                        <button type="button" class="auth-eye" aria-label="Show confirm password"
                                data-target="suConfirm">👁</button>
                    </div>
                </div>

                <button type="submit" id="signUpButton" class="btn-primary auth-submit">
                    Create Account
                </button>

            </form>

            <p class="auth-msg" id="suMsg" aria-live="polite"></p>

        </div>

        <p id="userStatus" style="display:none;"></p>

    </div>

    <div id="app-content" style="display:none;">
        <div class="page-wrap">
            <div id="characterListView">
                <div class="roster-header">
                    <h2>Your Characters</h2>
                    <div class="create-char-row">
                        <input id="charNameInput" placeholder="New character name...">
                        <button id="createCharButton" class="btn-primary">+ Create</button>
                    </div>
                </div>
                <div id="characterList" class="char-card-grid"></div>
            </div>

            <div id="editor" style="display:none;" class="sheet">
                <div class="sheet-header-bar">
                    <button id="backButton">&larr; Roster</button>
                    <h2 id="editorTitle">Character Sheet</h2>
                    <div style="width:80px;"></div>
                </div>

                <div class="sheet-inner">
                    <div id="sheetBlocks"></div>

                    <div class="section-divider" aria-hidden="true"></div>
                    <div class="sheet-section">
                        <h3>Inventory</h3>
                        <div id="inventoryContainer"></div>
                        <div class="section-add-row">
                            <input id="newItemName" placeholder="Item name">
                            <select id="newItemType">
                                <option value="weapon">Weapon</option>
                                <option value="armor">Armor</option>
                                <option value="consumable">Consumable</option>
                                <option value="misc">Misc</option>
                            </select>
                            <button id="addItemButton" class="btn-primary">+ Add</button>
                        </div>
                    </div>

                    <div class="section-divider" aria-hidden="true"></div>
                    <div class="sheet-section" id="systemTestsSection">
                        <h3>System Tests</h3>
                        <div class="test-controls">
                            <button id="runAllTests">Run All Tests</button>
                            <label class="test-auto-label">
                                <input type="checkbox" id="autoRunTests"> Auto-run after rerender
                            </label>
                        </div>
                        <div id="testResults"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="modules/app.js"></script>
</body>
</html>
