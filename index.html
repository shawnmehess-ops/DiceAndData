<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimoire - Character Sheet Manager</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="site-header">
        <h1>Grimoire</h1>
        <p class="subtitle">Character Sheet Manager</p>
        <div class="header-ornament" aria-hidden="true">
            <div class="line"></div>
            <div class="diamond"></div>
            <div class="diamond"></div>
            <div class="diamond"></div>
            <div class="line right"></div>
        </div>
        <div class="header-user-bar">
            <button id="signOutButton">Sign Out</button>
        </div>
    </header>

    <div id="auth-ui">
        <h2>Enter the Grimoire</h2>
        <div class="auth-field">
            <label>Email</label>
            <input type="email" id="emailInput" placeholder="your@email.com">
        </div>
        <div class="auth-field">
            <label>Password</label>
            <input type="password" id="passwordInput" placeholder="password">
        </div>
        <div class="auth-buttons">
            <button id="signUpButton" class="btn-secondary">Create Account</button>
            <button id="signInButton" class="btn-primary">Sign In</button>
        </div>
        <p id="userStatus"></p>
    </div>

    <div id="app-content" style="display:none;">
        <div class="page-wrap">
            <div id="characterListView">
                <div class="roster-header">
                    <h2>Your Characters</h2>
                    <div class="create-char-row">
                        <input id="charNameInput" placeholder="New character name...">
                        <button id="createCharButton" class="btn-primary">+ Create</button>
                    </div>
                </div>
                <div id="characterList" class="char-card-grid"></div>
            </div>

            <div id="editor" style="display:none;" class="sheet">
                <div class="sheet-header-bar">
                    <button id="backButton">&larr; Roster</button>
                    <h2 id="editorTitle">Character Sheet</h2>
                    <div style="width:80px;"></div>
                </div>

                <div class="sheet-inner">
                    <div id="sheetBlocks"></div>

                    <div class="section-divider" aria-hidden="true"></div>
                    <div class="sheet-section">
                        <h3>Inventory</h3>
                        <div id="inventoryContainer"></div>
                        <div class="section-add-row">
                            <input id="newItemName" placeholder="Item name">
                            <select id="newItemType">
                                <option value="weapon">Weapon</option>
                                <option value="armor">Armor</option>
                                <option value="consumable">Consumable</option>
                                <option value="misc">Misc</option>
                            </select>
                            <button id="addItemButton" class="btn-primary">+ Add</button>
                        </div>
                    </div>

                    <div class="section-divider" aria-hidden="true"></div>
                    <div class="sheet-section" id="systemTestsSection">
                        <h3>System Tests</h3>
                        <div class="test-controls">
                            <button id="runAllTests">Run All Tests</button>
                            <label class="test-auto-label">
                                <input type="checkbox" id="autoRunTests"> Auto-run after rerender
                            </label>
                        </div>
                        <div id="testResults"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="modules/app.js"></script>
</body>
</html>
